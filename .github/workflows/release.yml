on:
  workflow_dispatch:

name: Release AppImage

permissions:
    contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.fetch_lug.outputs.TAG }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Fetch latest tag
        id: fetch_lug
        run: |
          git fetch --tags
          echo "TAG=$(git describe --tags "$(git rev-list --tags --max-count=1)")" >> $GITHUB_OUTPUT
  build:
    needs: parse
    uses: mactan-sc/lug-helper-appimage/.github/workflows/build.yml@main
    with:
      tag: ${{ needs.parse.outputs.TAG }}
  release:
    runs-on: ubuntu-latest
    needs: [parse, build]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: lug helper $tag
          files: LUG-Helper-$tag.AppImage
          tag_name: $tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      

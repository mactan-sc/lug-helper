on:
  workflow_dispatch:
  create:
    tags:
      - 'v[0-9].[0-9]'
      - 'v[0-9].[0-9][0-9]'

name: Release AppImage

permissions:
    contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.fetch_lug.outputs.TAG }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Fetch latest tag
        id: fetch_lug
        run: |
          git fetch --tags
          echo "TAG=$(git describe --tags "$(git rev-list --tags --max-count=1)")" >> $GITHUB_OUTPUT
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y cabextract unzip curl libappimage-dev libfuse3-3 libmspack0
          sudo wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool && sudo chmod +x /usr/local/bin/appimagetool
      - name: Build
        run: |
          cat > AppRun <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          
          HERE="$(cd "$(dirname "$0")" && pwd -P)"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$HERE/lib:${LD_LIBRARY_PATH:-}"
          exec "$HERE/lug-helper.sh" "$@"
          EOF

          cat > lug-helper.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=LUG Helper
          GenericName=Star Citizen LUG Helper
          Comment=Star Citizen LUG helper and launcher installer
          Exec=AppRun
          Icon=lug-helper
          Terminal=true
          Categories=Game;
          EOF


          cat > lug-helper.appdata.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
          	<id>lug-helper</id>
          	<metadata_license>GPL-3.0</metadata_license>
          	<project_license>GPL-3.0</project_license>
          	<name>LUG Helper</name>
          	<summary>Star Citizen LUG helper and launcher installer</summary>
          	<description>
          		<p>The official installer of Star Citizen's Linux Users Group</p>
          	</description>
          	<launchable type="desktop-id">lug-helper.desktop</launchable>
          	<url type="homepage">https://wiki.starcitizen-lug.org/</url>
          	<provides>
          		<id>lug-helper.desktop</id>
          	</provides>
          </component>
          EOF
          
          APPDIR="${PWD}/AppDir"
          OUTPUT="${PWD}/LUG-Helper-${{ steps.fetch_lug.outputs.TAG }}.AppImage"
          
          rm -rf "$APPDIR" "$OUTPUT"
          mkdir -p "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/lib"
          
          cp "AppRun" "$APPDIR/"
          cp "lug-helper.desktop" "$APPDIR/"
          cp "lug-helper.sh" "$APPDIR/"
          cp "lib/sc-launch.sh" "$APPDIR/lib/"
          cp "lug-logo.png" "$APPDIR/lug-helper.png"
          ln -sf "lug-helper.png" "$APPDIR/.DirIcon"
          cp "lug-logo.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/lug-helper.png"
          cp "lug-helper.appdata.xml" "$APPDIR/usr/share/metainfo/"
          cp "rsi-launcher.png" "$APPDIR/rsi-launcher.png"
          cp "starcitizen.png" "$APPDIR/starcitizen.png"
          
          for cmd in unzip cabextract; do
              cp "$(command -v "$cmd")" "$APPDIR/usr/bin/"
              chmod +x "$APPDIR/usr/bin/$cmd"
           done
          
          cabextract_path="$(command -v cabextract)"
          libmspack_path="$(ldd "$cabextract_path" | awk '/libmspack.so\.0/ {print $3}')"
          cp "$libmspack_path" "$APPDIR/usr/lib/"
          
          chmod +x "$APPDIR/AppRun"
          chmod +x "$APPDIR/lug-helper.sh"
          
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH="${ARCH:-x86_64}" appimagetool "$APPDIR" "$OUTPUT"
          
          printf "AppImage created: %s\n" "$OUTPUT"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: LUG-Helper-${{ steps.fetch_lug.outputs.TAG }}.AppImage
          path: LUG-Helper-${{ steps.fetch_lug.outputs.TAG }}.AppImage
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: lug helper ${{ steps.fetch_lug.outputs.TAG }}
          files: LUG-Helper-${{ steps.fetch_lug.outputs.TAG }}.AppImage
          tag_name: ${{ steps.fetch_lug.outputs.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

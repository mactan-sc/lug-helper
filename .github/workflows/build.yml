on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
        default: ''

name: Build AppImage

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.artifact.outputs.name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Compute artifact name
        id: artifact
        run: |
          TAG="${{ inputs.tag }}"
          if [ -n "$TAG" ]; then
            echo "name=LUG-Helper-${TAG}.AppImage" >> "$GITHUB_OUTPUT"
          else
            echo "name=LUG-Helper.AppImage" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cabextract unzip curl libappimage-dev libfuse3-3 libmspack0

          sudo wget -q \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool

          sudo wget -q \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O /usr/local/bin/linuxdeploy

          sudo chmod +x \
            /usr/local/bin/appimagetool \
            /usr/local/bin/linuxdeploy

      - name: Build AppImage
        run: |
          cat > AppRun <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          HERE="$(cd "$(dirname "$0")" && pwd -P)"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$HERE/lib:${LD_LIBRARY_PATH:-}"
          export SSL_CERT_FILE="$HERE/etc/ssl/certs/ca-certificates.crt"
          export CURL_CA_BUNDLE="$HERE/etc/ssl/certs/ca-certificates.crt"
          exec "$HERE/lug-helper.sh" "$@"
          EOF

          cat > org.starcitizen_lug.lug-helper.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=LUG Helper
          GenericName=Star Citizen LUG Helper
          Comment=Star Citizen LUG helper and launcher installer
          Exec=AppRun
          Icon=lug-helper
          Terminal=true
          Categories=Game;
          EOF

          cat > org.starcitizen_lug.lug-helper.appdata.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>org.starcitizen_lug.lug-helper</id>
            <metadata_license>CC0-1.0</metadata_license>
            <project_license>GPL-3.0-or-later</project_license>
            <name>LUG Helper</name>
            <developer id="org.starcitizen_lug">
              <name>Star Citizen Linux User Group</name>
            </developer>
            <summary>Star Citizen LUG helper and launcher installer</summary>
            <description>
              <p>The official installer of Star Citizen's Linux Users Group</p>
            </description>
            <launchable type="desktop-id">org.starcitizen_lug.lug-helper.desktop</launchable>
            <url type="homepage">https://wiki.starcitizen-lug.org/</url>
            <provides>
              <id>org.starcitizen_lug.lug-helper.desktop</id>
            </provides>
          </component>
          EOF

          APPDIR="${PWD}/AppDir"
          OUTPUT="${PWD}/${{ steps.artifact.outputs.name }}"

          rm -rf "$APPDIR" "$OUTPUT"
          mkdir -p "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/metainfo"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/lib"
          mkdir -p "$APPDIR/etc/ssl/certs"

          cp "AppRun" "$APPDIR/"
          cp "org.starcitizen_lug.lug-helper.desktop" "$APPDIR/"
          cp "org.starcitizen_lug.lug-helper.desktop" "$APPDIR/usr/share/applications/"
          cp "lug-helper.sh" "$APPDIR/"
          cp "lib/sc-launch.sh" "$APPDIR/lib/"
          cp "lug-logo.png" "$APPDIR/lug-helper.png"
          cp "lug-logo.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/lug-helper.png"
          cp "org.starcitizen_lug.lug-helper.appdata.xml" "$APPDIR/usr/share/metainfo/"
          cp "rsi-launcher.png" "$APPDIR/rsi-launcher.png"
          cp "starcitizen.png" "$APPDIR/starcitizen.png"
          cp /etc/ssl/certs/ca-certificates.crt "$APPDIR/etc/ssl/certs/"

          ln -sf "lug-helper.png" "$APPDIR/.DirIcon"
          ln -sf "org.starcitizen_lug.lug-helper.appdata.xml" "$APPDIR/usr/share/metainfo/org.starcitizen_lug.lug-helper.metainfo.xml"

          # bundle host tools
          for cmd in \
              find \
              realpath \
              sort \
              tr \
              xargs \
              sort \
              cut \
              grep \
              sed \
              unzip \
              cabextract \
              curl \
              wget
          do
              linuxdeploy \
                --appdir "$APPDIR" \
                --executable "$(command -v "$cmd")" \
                --exclude-library="libpcre2*"
          done

          # Add desktop integration
          linuxdeploy \
            --appdir "$APPDIR" \
            --desktop-file "$APPDIR/org.starcitizen_lug.lug-helper.desktop" \
            --icon-file "$APPDIR/lug-helper.png"

          find "$APPDIR/usr/lib" -maxdepth 1 -name 'libpcre2*.so*' -delete

          chmod +x "$APPDIR/AppRun"
          chmod +x "$APPDIR/lug-helper.sh"

          ARCH="${ARCH:-x86_64}" appimagetool "$APPDIR" "$OUTPUT"
          printf "AppImage created: %s\n" "$OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}
